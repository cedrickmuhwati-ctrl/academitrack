<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}AcademiTrack{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Space Grotesk', sans-serif; background: #f0f4f8; }
    .navbar { background: #1a1a2e; }
    .navbar-brand, .nav-link { color: #e0e0ff !important; }
    .nav-link:hover { color: #a78bfa !important; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .btn-primary { background: #6d28d9; border: none; }
    .btn-primary:hover { background: #5b21b6; }
    .btn-success { background: #059669; border: none; }
    .table thead { background: #1a1a2e; color: #e0e0ff; }
    .badge-active   { background: #d1fae5; color: #065f46; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
    .badge-inactive { background: #fee2e2; color: #991b1b; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold fs-5" href="{{ url_for('index') }}">🎓 AcademiTrack</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="{{ url_for('add_record') }}">➕ Add Record</a>
      <a class="nav-link" href="{{ url_for('sort_search') }}">🔍 Sort &amp; Search</a>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show">{{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
